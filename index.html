<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MThree Player Dark</title>
  <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      background: #121212;
      color: #eee;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      zoom: 0.75;
    }
    h1 { margin: 20px 0; font-size: 2.5rem; color: #ff6600; }
    .input-container {
      display: flex; gap: 10px; margin-bottom: 20px;
      width: 80%; max-width: 1000px;
    }
    input {
      flex: 1; padding: 14px; border-radius: 8px;
      border: 1px solid #444; outline: none; font-size: 16px;
      background: #1e1e1e; color: #eee; font-family: "Comic Sans MS";
    }
    button {
      padding: 14px 20px; border: none; border-radius: 8px;
      background: #ff6600; color: #fff; font-weight: bold;
      cursor: pointer; transition: 0.3s;
      font-family: "Comic Sans MS";
    }
    button:hover { background: #cc5200; transform: scale(1.05); }
    .player-container {
      width: 90%; max-width: 1200px; border-radius: 12px;
      overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    video { width: 100%; height: 250px; border-radius: 12px; }
    .controls-extra {
      margin-top: 15px; display: flex; gap: 15px; justify-content: center;
    }
    .recording { background: #e63946 !important; }
    #searchBox {
      margin-top: 30px;
      width: 90%; max-width: 800px;
      background: #1e1e1e; color: #eee;
      padding: 15px; border-radius: 8px;
      border: 1px solid #444;
    }
    #results div {
      background: #2a2a2a;
      border: 1px solid #444;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 6px;
    }
    #helpBtn {
      margin-left:10px; padding:5px 10px; font-size:12px;
      border:none; border-radius:6px; background:#444; color:#fff;
      cursor:pointer; font-family:"Comic Sans MS";
    }
    #popup {
      display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:#1e1e1e; color:#eee; padding:20px; border-radius:10px;
      box-shadow:0 0 20px rgba(0,0,0,0.7); font-family:"Comic Sans MS"; max-width:400px;
    }
  </style>
</head>
<body>
  <h1>MThree Player</h1>

  <div class="input-container">
    <input type="text" id="m3uLink" placeholder="https://exemplo.com/playlist.m3u8" />
    <button onclick="playStream()">▶ Play</button>
  </div>

  <div class="player-container">
    <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
  </div>

  <div class="controls-extra">
    <button id="recordBtn" onclick="toggleRecording()">⏺ Gravar</button>
    <button onclick="takeSnapshot()">📸 Foto</button>
  </div>

  <!-- Search WebTVs -->
  <div id="searchBox">
    <h3>🔎 Buscar WebTVs 
      <button id="helpBtn">Como coloco?</button>
    </h3>
    <input type="text" id="searchInput" placeholder="Digite palavra-chave (ex: m3u)" />
    <button onclick="searchIssues()">Buscar</button>
    <div id="results"></div>
  </div>

  <!-- Popup -->
  <div id="popup">
    <h3>Como coloco?</h3>
    <p>
      Abra o link 
      <a href="https://github.com/discobak/Mthree_Archives/issues" target="_blank" style="color:#ff6600; font-weight:bold;">
        https://github.com/discobak/Mthree_Archives/issues
      </a>, crie um novo <strong>issue</strong> e preencha com o link da sua WebTV (<code>.m3u</code> ou <code>.m3u8</code>).
    </p>
    <button onclick="closePopup()" style="margin-top:10px; padding:6px 12px; font-size:12px; border:none; border-radius:6px; background:#ff6600; color:#fff; cursor:pointer; font-family:'Comic Sans MS';">Fechar</button>
  </div>

  <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
  <script>
    const player = videojs('videoPlayer', { fluid: true, autoplay: false });

    function playStream(url) {
      if (!url) {
        url = document.getElementById('m3uLink').value;
      }
      if (url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(() => {
          alert("A transmissão está instável. Contate **CartoonNetworkThree** para confirmar se é erro de transmissão. Caso não seja, reinicie a página.");
        });
        player.on('error', () => {
          alert("A transmissão está instável. Contate **CartoonNetworkThree** para confirmar se é erro de transmissão. Caso não seja, reinicie a página.");
        });
      } else {
        alert("Por favor, insira um link válido de .m3u ou .m3u8");
      }
    }

    let mediaRecorder, recordedChunks = [], isRecording = false;
    function toggleRecording() {
      const recordBtn = document.getElementById('recordBtn');
      const videoElement = document.querySelector('#videoPlayer_html5_api');
      if (!isRecording) {
        const stream = videoElement.captureStream();
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'gravacao.webm'; a.click();
          recordedChunks = [];
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "⏹ Parar Gravação";
        recordBtn.classList.add("recording");
      } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.textContent = "⏺ Gravar";
        recordBtn.classList.remove("recording");
      }
    }

    function takeSnapshot() {
      const videoElement = document.querySelector('#videoPlayer_html5_api');
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'snapshot.png'; a.click();
      });
    }

    async function searchIssues() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "Carregando...";

      try {
        const response = await fetch("https://api.github.com/repos/discobak/Mthree_Archives/issues?state=all");
        const issues = await response.json();

        const filtered = issues.filter(issue =>
          issue.title.toLowerCase().includes(query) ||
          (issue.body && issue.body
