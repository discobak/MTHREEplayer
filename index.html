<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>M3u Player</title>
  <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { font-weight: 600; margin-bottom: 10px; }
    .input-container {
      display: flex; gap: 10px; margin-bottom: 20px;
      width: 70%; max-width: 700px;
    }
    input {
      flex: 1; padding: 12px; border-radius: 8px;
      border: none; outline: none; font-size: 14px;
    }
    button {
      padding: 12px 20px; border: none; border-radius: 8px;
      background: #1db954; color: #fff; font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #17a74a; transform: scale(1.05); }
    .player-container {
      width: 80%; max-width: 900px; border-radius: 12px;
      overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      margin-top: 20px;
    }
    video { width: 100%; height: auto; border-radius: 12px; }
    .controls-extra { margin-top: 15px; display: flex; gap: 10px; }
    .recording { background: #e63946 !important; }
  </style>
</head>
<body>
  <h1>M3u Player</h1>
  <div class="input-container">
    <input type="text" id="m3uLink" placeholder="https://exemplo.com/playlist.m3u8" />
    <button onclick="playStream()">▶ Play</button>
  </div>

  <div class="player-container">
    <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
  </div>

  <div class="controls-extra">
    <button id="recordBtn" onclick="toggleRecording()">⏺ Gravar</button>
    <button onclick="takeSnapshot()">📸 Foto</button>
  </div>

  <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
  <script>
    const player = videojs('videoPlayer', {
      fluid: true,
      autoplay: false,
      controlBar: { volumePanel: { inline: false } }
    });

    function playStream() {
      const url = document.getElementById('m3uLink').value;
      if (url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(() => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
        player.on('error', () => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
      } else {
        alert("Por favor, insira um link válido de .m3u ou .m3u8");
      }
    }

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    async function toggleRecording() {
      const recordBtn = document.getElementById('recordBtn');
      const videoElement = document.querySelector('#videoPlayer_html5_api');

      if (!isRecording) {
        const stream = videoElement.captureStream();
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) recordedChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'gravaçãodiscobak.webm';
          a.click();
          recordedChunks = [];
        };

        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "⏹ Parar Gravação";
        recordBtn.classList.add("recording");
      } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.textContent = "⏺ Gravar";
        recordBtn.classList.remove("recording");
      }
    }

    function takeSnapshot() {
      const videoElement = document.querySelector('#videoPlayer_html5_api');
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'snapshot.png';
        a.click();
      });
    }
  </script>
</body>
</html>
