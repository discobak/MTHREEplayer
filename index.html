<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MThree Player</title>
  <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      background: linear-gradient(135deg, #ff6600, #ff8533, #ff9966);
      color: #fff;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 { margin: 20px 0; font-size: 2.5rem; text-shadow: 2px 2px #000; }
    .input-container {
      display: flex; gap: 10px; margin-bottom: 20px;
      width: 80%; max-width: 1000px;
    }
    input {
      flex: 1; padding: 14px; border-radius: 8px;
      border: none; outline: none; font-size: 16px;
    }
    button {
      padding: 14px 20px; border: none; border-radius: 8px;
      background: #cc5200; color: #fff; font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #993d00; transform: scale(1.05); }
    .player-container {
      width: 90%; max-width: 1200px; border-radius: 12px;
      overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    video { width: 100%; height: 250px; border-radius: 12px; }
    .controls-extra {
      margin-top: 15px; display: flex; gap: 15px; justify-content: center;
    }
    .recording { background: #e63946 !important; }
  </style>
</head>
<body>
  <h1>MThree Player</h1>

  <div class="input-container">
    <input type="text" id="m3uLink" placeholder="https://exemplo.com/playlist.m3u8" />
    <button onclick="playStream()">▶ Play</button>
  </div>

  <div class="player-container">
    <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
  </div>

  <div class="controls-extra">
    <button id="recordBtn" onclick="toggleRecording()">⏺ Gravar</button>
    <button onclick="takeSnapshot()">📸 Foto</button>
  </div>

  <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
  <script>
    const player = videojs('videoPlayer', { fluid: true, autoplay: false });

    function playStream() {
      const url = document.getElementById('m3uLink').value;
      if (url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(() => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
        player.on('error', () => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
      } else {
        alert("Por favor, insira um link válido de .m3u ou .m3u8");
      }
    }

    let mediaRecorder, recordedChunks = [], isRecording = false;
    function toggleRecording() {
      const recordBtn = document.getElementById('recordBtn');
      const videoElement = document.querySelector('#videoPlayer_html5_api');
      if (!isRecording) {
        const stream = videoElement.captureStream();
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'gravaçãodiscobak.webm'; a.click();
          recordedChunks = [];
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "⏹ Parar Gravação";
        recordBtn.classList.add("recording");
      } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.textContent = "⏺ Gravar";
        recordBtn.classList.remove("recording");
      }
    }

    function takeSnapshot() {
      const videoElement = document.querySelector('#videoPlayer_html5_api');
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'snapshot.png'; a.click();
      });
    }
  </script>
</body>
</html>
