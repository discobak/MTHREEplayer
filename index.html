<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MThree Player</title>
  <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      background: #222;
      color: #fff;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      color: #ff6600;
      margin: 20px 0;
    }
    .tabs {
      display: flex;
      background: #ff6600;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #ff6600;
      transition: background 0.3s;
    }
    .tab.active {
      background: #cc5200;
      font-weight: bold;
    }
    .tab:hover {
      background: #e65c00;
    }
    .tab-content {
      display: none;
      width: 80%;
      max-width: 900px;
    }
    .tab-content.active {
      display: block;
    }
    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #ff6600;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #cc5200;
      transform: scale(1.05);
    }
    .player-container {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }
    video {
      width: 100%;
      height: auto;
    }
    .controls-extra {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .recording { background: #e63946 !important; }
  </style>
</head>
<body>
  <h1>M3u Player</h1>

  <!-- Abas -->
  <div class="tabs">
    <div class="tab active" onclick="openTab('tab1')">📺 Player 1</div>
    <div class="tab" onclick="openTab('tab2')">🎬 Player 2</div>
  </div>

  <!-- Conteúdo da aba 1 -->
  <div id="tab1" class="tab-content active">
    <div class="input-container">
      <input type="text" id="m3uLink1" placeholder="https://exemplo.com/playlist1.m3u8" />
      <button onclick="playStream('m3uLink1','videoPlayer1')">▶ Play</button>
    </div>
    <div class="player-container">
      <video id="videoPlayer1" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>
    <div class="controls-extra">
      <button onclick="toggleRecording('videoPlayer1')">⏺ Gravar</button>
      <button onclick="takeSnapshot('videoPlayer1')">📸 Foto</button>
    </div>
  </div>

  <!-- Conteúdo da aba 2 -->
  <div id="tab2" class="tab-content">
    <div class="input-container">
      <input type="text" id="m3uLink2" placeholder="https://exemplo.com/playlist2.m3u8" />
      <button onclick="playStream('m3uLink2','videoPlayer2')">▶ Play</button>
    </div>
    <div class="player-container">
      <video id="videoPlayer2" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>
    <div class="controls-extra">
      <button onclick="toggleRecording('videoPlayer2')">⏺ Gravar</button>
      <button onclick="takeSnapshot('videoPlayer2')">📸 Foto</button>
    </div>
  </div>

  <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
  <script>
    const players = {
      videoPlayer1: videojs('videoPlayer1'),
      videoPlayer2: videojs('videoPlayer2')
    };

    function openTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[onclick="openTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function playStream(inputId, playerId) {
      const url = document.getElementById(inputId).value;
      const player = players[playerId];
      if (url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(() => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
        player.on('error', () => {
          alert("O m3u está offline. Pede pro dono ligar");
        });
      } else {
        alert("Por favor, insira um link válido de .m3u ou .m3u8");
      }
    }

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    function toggleRecording(playerId) {
      const videoElement = document.querySelector(`#${playerId}_html5_api`);
      const recordBtn = event.target;

      if (!isRecording) {
        const stream = videoElement.captureStream();
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) recordedChunks.push(event.data);
        };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'gravaçãodiscobak.webm';
          a.click();
          recordedChunks = [];
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "⏹ Parar Gravação";
        recordBtn.classList.add("recording");
      } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.textContent = "⏺ Gravar";
        recordBtn.classList.remove("recording");
      }
    }

    function takeSnapshot(playerId) {
      const videoElement = document.querySelector(`#${playerId}_html5_api`);
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'snapshot.png';
        a.click();
      });
    }
  </script>
</body>
</html>
